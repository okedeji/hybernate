name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  release:
    name: Build and Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} -o spdx-json=sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Build kubectl-hybernate plugin binaries
        run: |
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -o kubectl-hybernate-${os}-${arch} ./cmd/kubectl-hybernate
              tar czf kubectl-hybernate-${os}-${arch}.tar.gz kubectl-hybernate-${os}-${arch}
            done
          done

      - name: Generate Krew manifest with checksums
        run: |
          TAG=${{ steps.version.outputs.tag }}
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          cat > krew-hybernate.yaml <<EOF
          apiVersion: krew.googlecontainertools.github.com/v1alpha2
          kind: Plugin
          metadata:
            name: hybernate
          spec:
            version: ${TAG}
            homepage: https://github.com/${{ github.repository }}
            shortDescription: Export and manage workload lifecycle policies
            description: |
              Hybernate kubectl plugin for exporting discovered workloads from a
              WorkloadPolicy as ManagedWorkload YAML manifests. Supports filtering
              by classification (Active, Idle, Wasteful), specific workload name,
              and outputting to stdout or individual files for GitOps workflows.
            platforms:
          EOF

          for os in linux darwin; do
            for arch in amd64 arm64; do
              sha=$(sha256sum kubectl-hybernate-${os}-${arch}.tar.gz | cut -d' ' -f1)
              cat >> krew-hybernate.yaml <<PLATFORM
              - selector:
                  matchLabels:
                    os: ${os}
                    arch: ${arch}
                uri: ${BASE_URL}/kubectl-hybernate-${os}-${arch}.tar.gz
                sha256: "${sha}"
                bin: kubectl-hybernate-${os}-${arch}
          PLATFORM
            done
          done

      - name: Generate install manifest
        run: |
          make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}

      - name: Package and push Helm chart
        run: |
          helm package charts/hybernate --version ${{ steps.version.outputs.tag }} --app-version ${{ steps.version.outputs.tag }}
          helm push hybernate-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Extract changelog for release
        id: changelog
        run: |
          TAG=${{ steps.version.outputs.tag }}
          VERSION="${TAG#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/install.yaml
            hybernate-*.tgz
            kubectl-hybernate-*.tar.gz
            krew-hybernate.yaml
            sbom.spdx.json

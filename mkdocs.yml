site_name: Hybernate
site_description: Intelligent Kubernetes workload lifecycle management
site_url: https://okedeji.github.io/hybernate
repo_url: https://github.com/okedeji/hybernate
repo_name: okedeji/hybernate
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: black
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.action.edit
  icon:
    logo: material/snowflake
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - kubectl Plugin: getting-started/kubectl-plugin.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Lifecycle: concepts/lifecycle.md
      - Forecasting: concepts/forecasting.md
      - Idle Detection: concepts/idle-detection.md
      - Scaling: concepts/scaling.md
      - Cost Tracking: concepts/cost-tracking.md
  - Guides:
      - ManagedWorkload: guides/managed-workload.md
      - WorkloadPolicy: guides/workload-policy.md
      - Scaling: guides/scaling.md
      - Pause & Destroy: guides/pause-destroy.md
      - Prometheus Signals: guides/prometheus-signals.md
      - GitOps Export: guides/gitops-export.md
      - Cluster Autoscaler: guides/cluster-autoscaler.md
      - Dry Run: guides/dry-run.md
  - Reference:
      - API: reference/api.md
      - Helm Values: reference/helm-values.md
      - Metrics: reference/metrics.md
      - Labels & Annotations: reference/labels-annotations.md
      - Configuration: reference/configuration.md
  - Operations:
      - Monitoring: operations/monitoring.md
      - Troubleshooting: operations/troubleshooting.md
      - Upgrading: operations/upgrading.md
  - Contributing: contributing.md

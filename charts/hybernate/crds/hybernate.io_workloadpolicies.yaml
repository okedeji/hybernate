---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: workloadpolicies.hybernate.io
spec:
  group: hybernate.io
  names:
    kind: WorkloadPolicy
    listKind: WorkloadPolicyList
    plural: workloadpolicies
    shortNames:
    - wp
    singular: workloadpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.summary.total
      name: Discovered
      type: integer
    - jsonPath: .status.summary.active
      name: Active
      type: integer
    - jsonPath: .status.summary.idle
      name: Idle
      type: integer
    - jsonPath: .status.summary.wasteful
      name: Wasteful
      type: integer
    - jsonPath: .status.summary.estimatedMonthlyCost
      name: Projected Cost
      type: string
    - jsonPath: .status.summary.estimatedPotentialSavings
      name: Projected Savings
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkloadPolicy scans its own namespace for workloads that are candidates
          for lifecycle management and reports classification and savings estimates.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              WorkloadPolicySpec defines the discovery scope, classification thresholds,
              and default policies for workloads found in the namespace.
            properties:
              conflictAction:
                default: warn
                description: Default conflict action for exported/auto-created ManagedWorkloads.
                enum:
                - enforce
                - warn
                - defer
                type: string
              costTracking:
                description: Default cost rate overrides copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  rates:
                    description: Rates overrides the default cost rates. Omit to use
                      AWS on-demand defaults.
                    properties:
                      cpuPerHour:
                        anyOf:
                        - type: integer
                        - type: string
                        description: 'CPUPerHour is the cost per vCPU-hour (default:
                          $0.031, AWS on-demand).'
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      memoryPerHour:
                        anyOf:
                        - type: integer
                        - type: string
                        description: 'MemoryPerHour is the cost per GiB-hour (default:
                          $0.004, AWS on-demand).'
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      storagePerMonth:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          StoragePerMonth is the cost per GiB-month for PVC storage
                          (default: $0.08, AWS EBS gp3).
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
              cpuIdleThreshold:
                default: 10
                description: CPU utilization percentage of request below which a workload
                  is Idle.
                maximum: 100
                minimum: 0
                type: integer
              cpuWastefulThreshold:
                default: 30
                description: CPU utilization percentage below which a non-idle workload
                  is Wasteful.
                maximum: 100
                minimum: 0
                type: integer
              destroy:
                default:
                  pvcRetention: 168h0m0s
                  pvcRetentionWarning: 24h0m0s
                description: Default destroy behavior copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  pvcRetention:
                    description: |-
                      PVCRetention is how long to keep PVCs after the workload is destroyed.
                      After this period, PVCs are deleted. Omit to delete PVCs immediately.
                    format: duration
                    type: string
                  pvcRetentionWarning:
                    description: |-
                      PVCRetentionWarning triggers a warning event this duration before
                      PVCs are deleted, giving users time to recover data if needed.
                    format: duration
                    type: string
                type: object
              dryRun:
                default: true
                description: DryRun default for ManagedWorkloads created in auto-manage
                  mode.
                type: boolean
              idlePolicy:
                default:
                  action: pause
                  autoResume: true
                  cpuIdleThreshold: 10
                  gracePeriod: 5m0s
                  memoryIdleThreshold: 10
                description: Default idle policy copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  action:
                    default: auto
                    description: |-
                      Action to take when the workload is confirmed idle. "auto" and "pause"
                      both scale to zero; "destroy" deletes the workload entirely.
                    enum:
                    - auto
                    - pause
                    - destroy
                    type: string
                  autoResume:
                    description: |-
                      AutoResume re-enables the workload when idle detection clears
                      (i.e. signals no longer confirm idle).
                    type: boolean
                  cpuIdleThreshold:
                    default: 10
                    description: |-
                      CPUIdleThreshold is the CPU utilization percentage of request below
                      which the workload is considered potentially idle (e.g. 10 means idle
                      if CPU usage < 10% of CPU request).
                    maximum: 100
                    minimum: 0
                    type: integer
                  gracePeriod:
                    description: |-
                      GracePeriod is how long signals must continuously confirm idle before
                      the operator acts. Protects against brief quiet moments triggering
                      a false idle.
                    format: duration
                    type: string
                  memoryIdleThreshold:
                    default: 10
                    description: |-
                      MemoryIdleThreshold is the memory utilization percentage of request
                      below which the workload is considered potentially idle. Both CPU and
                      memory must be below their respective thresholds for idle detection
                      to confirm.
                    maximum: 100
                    minimum: 0
                    type: integer
                  signals:
                    description: |-
                      Signals are additional checks that must all confirm before the workload
                      is considered idle. An internal CPU usage check runs automatically;
                      these signals are layered on top for application-level confirmation.
                    items:
                      description: |-
                        ProbeSpec defines an external check used for idle detection signals or
                        scale-down guards. For Prometheus probes, the PromQL query must return a
                        non-zero value to confirm the action. An empty result or zero value denies it.
                      properties:
                        promQL:
                          description: |-
                            PromQL is an instant query evaluated against the configured Prometheus
                            endpoint. The query must return a non-zero scalar to confirm the action.
                            Examples:
                              Idle signal:      rate(http_requests_total{service="api"}[10m]) == 0
                              Scale-down guard: sum(websocket_active_connections{service="api"}) < 100
                          type: string
                        source:
                          default: prometheus
                          enum:
                          - prometheus
                          type: string
                      required:
                      - source
                      type: object
                    type: array
                required:
                - action
                type: object
              memoryIdleThreshold:
                default: 10
                description: |-
                  Memory utilization percentage of request below which a workload is Idle.
                  Both CPU and memory must be below their respective thresholds.
                maximum: 100
                minimum: 0
                type: integer
              memoryWastefulThreshold:
                default: 30
                description: |-
                  Memory utilization percentage below which a non-idle workload is Wasteful.
                  A workload is Wasteful if either CPU or memory utilization is below
                  its respective threshold.
                maximum: 100
                minimum: 0
                type: integer
              mode:
                default: suggest
                enum:
                - suggest
                - auto-manage
                type: string
              pause:
                default:
                  expireAction: resume
                  expireAfter: 168h0m0s
                description: Default pause behavior copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  expireAction:
                    default: destroy
                    description: |-
                      ExpireAction determines what happens when ExpireAfter elapses.
                      "destroy" deletes the workload; "resume" scales it back up.
                    enum:
                    - destroy
                    - resume
                    type: string
                  expireAfter:
                    description: |-
                      ExpireAfter is the maximum duration a workload can remain paused.
                      After this period, the operator executes the ExpireAction.
                    format: duration
                    type: string
                type: object
              prediction:
                default:
                  confidence: 85
                description: Default prediction config copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  confidence:
                    default: 85
                    description: |-
                      Confidence is the minimum accuracy percentage (0-100) required before
                      the prediction engine transitions from suggesting (shadow mode) to
                      actively driving decisions.
                    maximum: 100
                    minimum: 0
                    type: integer
                required:
                - confidence
                type: object
              rates:
                description: |-
                  CostRates holds per-unit cost rates. Users set these to match their
                  cloud provider pricing. All values are in USD.
                properties:
                  cpuPerHour:
                    anyOf:
                    - type: integer
                    - type: string
                    description: 'CPUPerHour is the cost per vCPU-hour (default: $0.031,
                      AWS on-demand).'
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  memoryPerHour:
                    anyOf:
                    - type: integer
                    - type: string
                    description: 'MemoryPerHour is the cost per GiB-hour (default:
                      $0.004, AWS on-demand).'
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storagePerMonth:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      StoragePerMonth is the cost per GiB-month for PVC storage
                      (default: $0.08, AWS EBS gp3).
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                type: object
              rightSizeTarget:
                default: 70
                description: Target utilization percentage for right-sizing savings
                  estimates.
                maximum: 100
                minimum: 1
                type: integer
              scalePolicy:
                default:
                  down:
                    stabilization: 5m0s
                  maxReplicas: 10
                  minReplicas: 1
                  up:
                    stabilization: 2m0s
                description: Default scaling policy copied into exported/auto-created
                  ManagedWorkloads.
                properties:
                  down:
                    description: |-
                      Down configures scale-down behavior including stabilization, step
                      limits, and guard probes.
                    properties:
                      guard:
                        description: |-
                          Guard probes that must all confirm before a scale-down proceeds.
                          An internal CPU capacity check runs automatically; these probes
                          add application-level safety gates (e.g. active connections, in-flight jobs).
                        items:
                          description: |-
                            ProbeSpec defines an external check used for idle detection signals or
                            scale-down guards. For Prometheus probes, the PromQL query must return a
                            non-zero value to confirm the action. An empty result or zero value denies it.
                          properties:
                            promQL:
                              description: |-
                                PromQL is an instant query evaluated against the configured Prometheus
                                endpoint. The query must return a non-zero scalar to confirm the action.
                                Examples:
                                  Idle signal:      rate(http_requests_total{service="api"}[10m]) == 0
                                  Scale-down guard: sum(websocket_active_connections{service="api"}) < 100
                              type: string
                            source:
                              default: prometheus
                              enum:
                              - prometheus
                              type: string
                          required:
                          - source
                          type: object
                        type: array
                      maxStep:
                        description: |-
                          MaxStep limits how many replicas can be added or removed in a single
                          reconciliation loop. Enables gradual ramp-up or ramp-down.
                        minimum: 1
                        type: integer
                      stabilization:
                        description: |-
                          Stabilization is the cooldown period after a scale event in this
                          direction. Prevents oscillation by blocking same-direction scaling
                          until the window elapses.
                        format: duration
                        type: string
                    type: object
                  maxReplicas:
                    description: |-
                      MaxReplicas is the ceiling for scaling. The operator will never scale
                      above this value.
                    minimum: 1
                    type: integer
                  minReplicas:
                    default: 1
                    description: |-
                      MinReplicas is the floor for scaling. The operator will never scale
                      below this value.
                    minimum: 0
                    type: integer
                  overrideReplicas:
                    description: |-
                      OverrideReplicas bypasses prediction and forces the operator to scale
                      to this exact replica count (clamped to [minReplicas, maxReplicas]).
                      Stabilization and step limits still apply. Remove the field to return
                      to prediction-driven scaling.
                    format: int32
                    minimum: 0
                    type: integer
                  up:
                    description: Up configures scale-up behavior including stabilization
                      and step limits.
                    properties:
                      guard:
                        description: |-
                          Guard probes that must all confirm before a scale-down proceeds.
                          An internal CPU capacity check runs automatically; these probes
                          add application-level safety gates (e.g. active connections, in-flight jobs).
                        items:
                          description: |-
                            ProbeSpec defines an external check used for idle detection signals or
                            scale-down guards. For Prometheus probes, the PromQL query must return a
                            non-zero value to confirm the action. An empty result or zero value denies it.
                          properties:
                            promQL:
                              description: |-
                                PromQL is an instant query evaluated against the configured Prometheus
                                endpoint. The query must return a non-zero scalar to confirm the action.
                                Examples:
                                  Idle signal:      rate(http_requests_total{service="api"}[10m]) == 0
                                  Scale-down guard: sum(websocket_active_connections{service="api"}) < 100
                              type: string
                            source:
                              default: prometheus
                              enum:
                              - prometheus
                              type: string
                          required:
                          - source
                          type: object
                        type: array
                      maxStep:
                        description: |-
                          MaxStep limits how many replicas can be added or removed in a single
                          reconciliation loop. Enables gradual ramp-up or ramp-down.
                        minimum: 1
                        type: integer
                      stabilization:
                        description: |-
                          Stabilization is the cooldown period after a scale event in this
                          direction. Prevents oscillation by blocking same-direction scaling
                          until the window elapses.
                        format: duration
                        type: string
                    type: object
                required:
                - maxReplicas
                - minReplicas
                type: object
              scanInterval:
                default: 10m
                type: string
              targetKinds:
                default:
                - Deployment
                - StatefulSet
                items:
                  enum:
                  - Deployment
                  - StatefulSet
                  type: string
                type: array
            type: object
          status:
            description: WorkloadPolicyStatus reports the results of the most recent
              namespace scan.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              discovered:
                description: |-
                  Per-workload results from the last scan, capped at 500 entries
                  sorted by estimated savings descending.
                items:
                  properties:
                    classification:
                      enum:
                      - Active
                      - Idle
                      - Wasteful
                      type: string
                    cpuRequestMillis:
                      format: int64
                      type: integer
                    cpuUsageMillis:
                      format: int64
                      type: integer
                    cpuUtilizationPercent:
                      type: integer
                    estimatedMonthlyCost:
                      type: string
                    estimatedPotentialSavings:
                      type: string
                    ignored:
                      type: boolean
                    kind:
                      enum:
                      - Deployment
                      - StatefulSet
                      type: string
                    managed:
                      type: boolean
                    memoryRequestBytes:
                      format: int64
                      type: integer
                    memoryUsageBytes:
                      format: int64
                      type: integer
                    memoryUtilizationPercent:
                      type: integer
                    name:
                      type: string
                    replicas:
                      format: int32
                      type: integer
                    storageBytes:
                      format: int64
                      type: integer
                  required:
                  - classification
                  - cpuRequestMillis
                  - cpuUsageMillis
                  - cpuUtilizationPercent
                  - kind
                  - managed
                  - memoryRequestBytes
                  - memoryUsageBytes
                  - name
                  - replicas
                  type: object
                type: array
              lastScanAt:
                format: date-time
                type: string
              summary:
                properties:
                  active:
                    type: integer
                  estimatedMonthlyCost:
                    type: string
                  estimatedPotentialSavings:
                    type: string
                  idle:
                    type: integer
                  managed:
                    type: integer
                  total:
                    type: integer
                  wasteful:
                    type: integer
                required:
                - active
                - idle
                - managed
                - total
                - wasteful
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

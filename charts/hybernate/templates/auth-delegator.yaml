{{- if .Values.metrics.secure }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hybernate.fullname" . }}-auth-delegator
  labels:
    {{- include "hybernate.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ include "hybernate.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

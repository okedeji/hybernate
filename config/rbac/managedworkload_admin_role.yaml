# This rule is not used by the project hybernate itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over hybernate.hybernate.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hybernate
    app.kubernetes.io/managed-by: kustomize
  name: managedworkload-admin-role
rules:
- apiGroups:
  - hybernate.hybernate.io
  resources:
  - managedworkloads
  verbs:
  - '*'
- apiGroups:
  - hybernate.hybernate.io
  resources:
  - managedworkloads/status
  verbs:
  - get

# This rule is not used by the project hybernate itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to hybernate.hybernate.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hybernate
    app.kubernetes.io/managed-by: kustomize
  name: managedworkload-viewer-role
rules:
- apiGroups:
  - hybernate.hybernate.io
  resources:
  - managedworkloads
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - hybernate.hybernate.io
  resources:
  - managedworkloads/status
  verbs:
  - get
